<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept 2 — Career Trajectory Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    background: #f0f2f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
  }

  .card {
    width: 660px;
    background: #fff;
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    padding: 24px 10px 10px;
  }

  .title {
    font-size: 10.5px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2.2px;
    color: #1e293b;
    text-align: center;
    margin-bottom: 8px;
  }

  .svg-wrap {
    width: 100%;
    display: block;
  }
  .svg-wrap svg {
    display: block;
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>

<div class="card">
  <div class="title">Career Trajectory</div>

  <div class="svg-wrap">
    <svg viewBox="0 0 640 380" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Arrow marker -->
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
        </marker>
        <!-- Glow filter for current node -->
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Quadrant background fills -->
      <rect x="60" y="20" width="275" height="165" rx="4" fill="#f8fafc"/>
      <rect x="335" y="20" width="275" height="165" rx="4" fill="#f0fdf4"/>
      <rect x="60" y="185" width="275" height="165" rx="4" fill="#fefce8"/>
      <rect x="335" y="185" width="275" height="165" rx="4" fill="#fef2f2"/>

      <!-- Quadrant labels -->
      <text x="195" y="50" text-anchor="middle" font-size="10" font-weight="600" fill="#cbd5e1" letter-spacing="1.5">SPECIALIST DEPTH</text>
      <text x="472" y="50" text-anchor="middle" font-size="10" font-weight="600" fill="#bbf7d0" letter-spacing="1.5">STRATEGIC LEADERSHIP</text>
      <text x="195" y="338" text-anchor="middle" font-size="10" font-weight="600" fill="#fef08a" letter-spacing="1.5">FIELD EXECUTION</text>
      <text x="472" y="338" text-anchor="middle" font-size="10" font-weight="600" fill="#fecaca" letter-spacing="1.5">OPERATIONS SCALE</text>

      <!-- Axes -->
      <line x1="60" y1="185" x2="610" y2="185" stroke="#e2e8f0" stroke-width="1"/>
      <line x1="335" y1="20" x2="335" y2="350" stroke="#e2e8f0" stroke-width="1"/>

      <!-- Axis endpoint labels -->
      <text x="62" y="192" font-size="7" font-weight="600" fill="#94a3b8" letter-spacing="0.5" dominant-baseline="hanging">EXECUTION</text>
      <text x="608" y="192" font-size="7" font-weight="600" fill="#94a3b8" letter-spacing="0.5" text-anchor="end" dominant-baseline="hanging">STRATEGY</text>
      <text x="335" y="358" font-size="7" font-weight="600" fill="#94a3b8" letter-spacing="0.5" text-anchor="middle">DOMAIN SPECIALIST</text>
      <text x="335" y="14" font-size="7" font-weight="600" fill="#94a3b8" letter-spacing="0.5" text-anchor="middle">CROSS-FUNCTIONAL LEADER</text>

      <!-- Trajectory curves -->
      <path d="M 165,278 C 210,250 240,195 275,155" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
      <path d="M 305,135 C 350,160 390,205 430,232" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
      <path d="M 460,212 C 490,170 510,120 530,90" fill="none" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow)"/>

      <!-- ===== NODE 1: Pharma Sales — bottom-left quadrant ===== -->
      <circle cx="150" cy="290" r="30" fill="#0d9488" opacity="0.12"/>
      <circle cx="150" cy="290" r="22" fill="#0d9488"/>
      <text x="150" y="287" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">2014</text>
      <text x="150" y="297" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">2019</text>
      <!-- Label -->
      <text x="150" y="258" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1e293b">Pharma Sales</text>
      <!-- Skills -->
      <text x="150" y="322" text-anchor="middle" font-size="7.5" fill="#64748b">Pharma Domain &middot; Territory &middot; Key Accounts</text>
      <!-- Org -->
      <text x="150" y="334" text-anchor="middle" font-size="7" font-style="italic" fill="#94a3b8">Intas / J&amp;J / Novartis</text>

      <!-- ===== NODE 2: iCAP — top-left quadrant ===== -->
      <circle cx="280" cy="140" r="30" fill="#7c3aed" opacity="0.12"/>
      <circle cx="280" cy="140" r="22" fill="#7c3aed"/>
      <text x="280" y="137" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">2021</text>
      <text x="280" y="147" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">2022</text>
      <!-- Label -->
      <text x="280" y="108" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1e293b">iCAP Rotations</text>
      <!-- Skills -->
      <text x="280" y="172" text-anchor="middle" font-size="7.5" fill="#64748b">Program Delivery &middot; Solutioning &middot; Client Mgmt</text>
      <!-- Org -->
      <text x="280" y="184" text-anchor="middle" font-size="7" font-style="italic" fill="#94a3b8">BSV / Sanofi / Solution Design</text>

      <!-- ===== NODE 3: Commercial Ops — bottom-right quadrant ===== -->
      <circle cx="445" cy="240" r="30" fill="#2563eb" opacity="0.12"/>
      <circle cx="445" cy="240" r="22" fill="#2563eb"/>
      <text x="445" y="237" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">2022</text>
      <text x="445" y="247" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">2024</text>
      <!-- Label -->
      <text x="445" y="208" text-anchor="middle" font-size="9.5" font-weight="700" fill="#1e293b">Commercial Ops</text>
      <!-- Skills -->
      <text x="445" y="272" text-anchor="middle" font-size="7.5" fill="#64748b">Account P&amp;L &middot; Automation &middot; Governance</text>
      <!-- Org -->
      <text x="445" y="284" text-anchor="middle" font-size="7" font-style="italic" fill="#94a3b8">Amgen ELMAC / Multi-portfolio</text>

      <!-- ===== NODE 4: GenAI Strategy — top-right (CURRENT) ===== -->
      <circle cx="545" cy="78" r="34" fill="#e11d48" opacity="0.1" filter="url(#glow)"/>
      <circle cx="545" cy="78" r="25" fill="#e11d48"/>
      <text x="545" y="74" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">2024</text>
      <text x="545" y="84" text-anchor="middle" font-size="8" font-weight="700" fill="#fff">NOW</text>
      <!-- Label -->
      <text x="545" y="44" text-anchor="middle" font-size="9.5" font-weight="700" fill="#be123c">GenAI Strategy</text>
      <!-- Skills -->
      <text x="545" y="114" text-anchor="middle" font-size="7.5" fill="#64748b">AI Platforms &middot; Strategy &middot; Exec Stakeholders</text>
      <!-- Org -->
      <text x="545" y="126" text-anchor="middle" font-size="7" font-style="italic" fill="#94a3b8">Vertex / AstraZeneca / Platforms</text>

    </svg>
  </div>
</div>

</body>
</html>
